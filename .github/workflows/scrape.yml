name: Threat Intel Scraper

on:
  schedule:
    - cron: '0 */12 * * *' # Twice a day
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for the bot to push changes
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Scraper
        run: python scrape.py

      - name: Commit results
        run: |
          git config --global user.name "Scraper Bot"
          git config --global user.email "bot@github.com"
          git add data/*.txt
          git commit -m "Update logs: $(date +'%Y-%m-%d %H:%M')" || echo "No new data"
          git push
